<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dominators Cup</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

section{
display:none;
padding:20px;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

input{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
🏆 Dominators Cup
</header>

<nav>
<button onclick="abrir('tabela')">Tabela</button>
<button onclick="abrir('jogos')">Jogos</button>
<button onclick="abrir('adm')">ADM</button>
</nav>

<section id="tabela" class="active">

<h2>Classificação</h2>

<table id="tabelaClassificacao">

<thead>
<tr>
<th>Time</th>
<th>P</th>
<th>V</th>
<th>D</th>
<th>SG</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section id="jogos">

<h2>Jogos</h2>

<table id="tabelaJogos">

<thead>
<tr>
<th>Time 1</th>
<th>Placar</th>
<th>Time 2</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section id="adm">

<h2>Painel ADM</h2>

<div class="card">

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div class="card">

<h3>Adicionar jogo</h3>

<input id="time1" placeholder="Time 1">
<input id="g1" type="number" placeholder="Gols time 1">

<br>

<input id="time2" placeholder="Time 2">
<input id="g2" type="number" placeholder="Gols time 2">

<br><br>

<button onclick="addJogo()">Adicionar</button>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

<script>

const { Client, Databases, Account, ID } = Appwrite;

const client = new Client();

client
.setEndpoint("https://sfo.cloud.appwrite.io/v1")
.setProject("69acaf3f003a7c46d555");

const account = new Account(client);
const databases = new Databases(client);

const DATABASE_ID = "69acb01700212f425e07";
const COLLECTION_ID = "matches";

let usuario = null;

async function verificarLogin(){

try{
usuario = await account.get();
}
catch{
usuario=null;
}

}

async function login(){

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

try{

await account.createEmailPasswordSession(email,senha);

alert("Login feito");

usuario=await account.get();

}
catch(e){
alert(e.message);
}

}

async function addJogo(){

if(!usuario){
alert("Faça login primeiro");
return;
}

const time1=document.getElementById("time1").value;
const time2=document.getElementById("time2").value;
const gols1=parseInt(document.getElementById("g1").value);
const gols2=parseInt(document.getElementById("g2").value);

try{

await databases.createDocument(
DATABASE_ID,
COLLECTION_ID,
ID.unique(),
{
time1,
time2,
gols1,
gols2
}
);

alert("Jogo adicionado");

carregarJogos();

}
catch(e){
alert(e.message);
}

}

async function carregarJogos(){

const tabela=document.querySelector("#tabelaJogos tbody");

tabela.innerHTML="";

const res=await databases.listDocuments(
DATABASE_ID,
COLLECTION_ID
);

res.documents.forEach(j=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${j.time1}</td>
<td>${j.gols1} x ${j.gols2}</td>
<td>${j.time2}</td>
`;

tabela.appendChild(tr);

});

gerarTabela(res.documents);

}

function gerarTabela(jogos){

const times={};

jogos.forEach(j=>{

if(!times[j.time1]) times[j.time1]={p:0,v:0,d:0,sg:0};
if(!times[j.time2]) times[j.time2]={p:0,v:0,d:0,sg:0};

times[j.time1].sg += j.gols1 - j.gols2;
times[j.time2].sg += j.gols2 - j.gols1;

if(j.gols1 > j.gols2){

times[j.time1].p+=3;
times[j.time1].v++;

times[j.time2].d++;

}

else if(j.gols2 > j.gols1){

times[j.time2].p+=3;
times[j.time2].v++;

times[j.time1].d++;

}

});

const lista=Object.entries(times).sort((a,b)=>b[1].p - a[1].p);

const tabela=document.querySelector("#tabelaClassificacao tbody");

tabela.innerHTML="";

lista.forEach(([nome,t])=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${nome}</td>
<td>${t.p}</td>
<td>${t.v}</td>
<td>${t.d}</td>
<td>${t.sg}</td>
`;

tabela.appendChild(tr);

});

}

function abrir(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

verificarLogin();

carregarJogos();

</script>

</body>
</html>
